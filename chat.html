<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 🌐 Navbar -->
  <header class="main-header">
    <h1>⚖️ JusticeBot</h1>

      <a href="/dashboard.html">Dashboard</a>      
      <a href="/about.html">About</a>

  <!-- 💬 Chat Interface -->
  <div class="chat-container">
    <header class="chat-header">
      <h2>⚖️ JusticeBot</h2>
      <p>Your Indian Legal Assistant</p>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    </header>

    <div class="chat-box" id="chat-box">
      <div class="message bot">👩‍⚖️ JusticeBot: Hello! How can I assist you today?</div>
    </div>

    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your question..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- 🗂 Floating Buttons -->
  <div class="floating-buttons">
    <button id="clear-chat" title="Clear Chat">🗑️</button>
    <button id="download-chat" title="Download Chat">⬇️</button>
  </div>

  <!-- ⚖️ Footer -->
